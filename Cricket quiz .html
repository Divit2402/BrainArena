<!DOCTYPE html>
<html>
<head>
    <title>Simple Quiz</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }
        .question {
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
        }
        #result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>General Knowledge Quiz</h1>

    <form id="quizForm">

        <div class="question">
            <p>1. What is the capital of India?</p>
            <input type="radio" name="q1" value="A"> Mumbai<br>
            <input type="radio" name="q1" value="B"> New Delhi<br>
            <input type="radio" name="q1" value="C"> Kolkata<br>
        </div>

        <div class="question">
            <p>2. How many days are there in a week?</p>
            <input type="radio" name="q2" value="A"> 5<br>
            <input type="radio" name="q2" value="B"> 6<br>
            <input type="radio" name="q2" value="C"> 7<br>
        </div>

        <div class="question">
            <p>3. Which planet is known as the Red Planet?</p>
            <input type="radio" name="q3" value="A"> Mars<br>
            <input type="radio" name="q3" value="B"> Venus<br>
            <input type="radio" name="q3" value="C"> Jupiter<br>
        </div>

        <div class="question">
            <p>4. What is 5 × 6?</p>
            <input type="radio" name="q4" value="A"> 25<br>
            <input type="radio" name="q4" value="B"> 30<br>
            <input type="radio" name="q4" value="C"> 35<br>
        </div>

        <div class="question">
            <p>5. Which language is used to create web pages?</p>
            <input type="radio" name="q5" value="A"> HTML<br>
            <input type="radio" name="q5" value="B"> Python<br>
            <input type="radio" name="q5" value="C"> Java<br>
        </div>

        <button type="button" onclick="checkQuiz()">Submit Quiz</button>
    </form>

    <div id="result"></div>

    <script>
        function checkQuiz() {
            let score = 0;

            const answers = {
                q1: "B",
                q2: "C",
                q3: "A",
                q4: "B",
                q5: "A"
            };

            for (let q in answers) {
                const selected = document.querySelector(`input[name="${q}"]:checked`);
                if (selected && selected.value === answers[q]) {
                    score++;
                }
            }

            document.getElementById("result").innerHTML =
                "Your Score: " + score + " / 5";
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Football Quiz</title>
</head>
<body>

<h1>⚽ Football Quiz</h1>

<form id="quiz">

    <h3>1. How many players are there in a football team on the field?</h3>
    <input type="radio" name="q1" value="9"> 9<br>
    <input type="radio" name="q1" value="10"> 10<br>
    <input type="radio" name="q1" value="11"> 11<br>
    <input type="radio" name="q1" value="12"> 12<br><br>

    <h3>2. Which country won the FIFA World Cup in 2022?</h3>
    <input type="radio" name="q2" value="Brazil"> Brazil<br>
    <input type="radio" name="q2" value="Argentina"> Argentina<br>
    <input type="radio" name="q2" value="France"> France<br>
    <input type="radio" name="q2" value="Germany"> Germany<br><br>

    <h3>3. Which player is known as "The King of Football"?</h3>
    <input type="radio" name="q3" value="Pele"> Pelé<br>
    <input type="radio" name="q3" value="Messi"> Lionel Messi<br>
    <input type="radio" name="q3" value="Ronaldo"> Cristiano Ronaldo<br>
    <input type="radio" name="q3" value="Neymar"> Neymar<br><br>

    <button type="button" onclick="checkQuiz()">Submit</button>

</form>

<h2 id="result"></h2>

<script>
function checkQuiz() {

    let score = 0;

    let q1 = document.querySelector('input[name="q1"]:checked');
    let q2 = document.querySelector('input[name="q2"]:checked');
    let q3 = document.querySelector('input[name="q3"]:checked');

    if (!q1 || !q2 || !q3) {
        document.getElementById("result").innerHTML =
            "Please answer all the questions!";
        return;
    }

    if (q1.value == "11")
        score++;

    if (q2.value == "Argentina")
        score++;

    if (q3.value == "Pele")
        score++;

    let message;

    if (score == 3)
        message = "🏆 Excellent! You scored 3/3!";
    else if (score == 2)
        message = "👍 Good Job! You scored 2/3.";
    else if (score == 1)
        message = "🙂 You scored 1/3. Keep practicing!. Some day,you many score 3/3";
    else
        message = "😢 You scored 0/3. Better luck next time!";

    document.getElementById("result").innerHTML = message;
}
</script>

</body>
</html>

  </HTML>

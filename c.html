<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hard Cricket Quiz</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#0f9b0f,#56ab2f);
    margin:0;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#1b5e20;
}

.question{
    background:#f7fff7;
    border-left:5px solid #4caf50;
    padding:15px;
    margin:15px 0;
    border-radius:8px;
}

.question p{
    font-weight:bold;
}

label{
    display:block;
    margin:8px 0;
}

button{
    display:block;
    margin:25px auto;
    padding:12px 30px;
    font-size:18px;
    background:#2e7d32;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#1b5e20;
}

#result{
    text-align:center;
    font-size:28px;
    font-weight:bold;
    margin-top:20px;
    color:#2e7d32;
}
</style>
</head>
<body>

<div class="container">
<h1>🏏 Hard Cricket Quiz 🏏</h1>

<form id="quizForm"></form>

<button type="button" onclick="checkAnswers()">Submit Quiz</button>

<div id="result"></div>
</div>

<script>

const quizData = [

{
question:"Who was the first batsman to score a double century in ODI cricket?",
options:["Sachin Tendulkar","Virender Sehwag","Rohit Sharma","Chris Gayle"],
answer:"Sachin Tendulkar"
},

{
question:"Which bowler has taken the most wickets in Test cricket?",
options:["Shane Warne","Muttiah Muralitharan","James Anderson","Anil Kumble"],
answer:"Muttiah Muralitharan"
},

{
question:"Who scored the fastest century in ODI cricket?",
options:["AB de Villiers","Corey Anderson","Shahid Afridi","Glenn Maxwell"],
answer:"AB de Villiers"
},

{
question:"Which country won the inaugural ICC Cricket World Cup in 1975?",
options:["Australia","India","West Indies","England"],
answer:"West Indies"
},

{
question:"Who was the first captain to win all three ICC white-ball trophies?",
options:["MS Dhoni","Ricky Ponting","Clive Lloyd","Eoin Morgan"],
answer:"MS Dhoni"
},

{
question:"Which player has scored the most runs in Test cricket?",
options:["Ricky Ponting","Sachin Tendulkar","Jacques Kallis","Kumar Sangakkara"],
answer:"Sachin Tendulkar"
},

{
question:"What is the highest successful run chase in ODI history?",
options:["434","438","372","418"],
answer:"438"
},

{
question:"Which bowler took all 10 wickets in a Test innings for India?",
options:["Harbhajan Singh","Anil Kumble","Ravichandran Ashwin","Jasprit Bumrah"],
answer:"Anil Kumble"
},

{
question:"Who hit six sixes in an over in the 2007 T20 World Cup?",
options:["Chris Gayle","Yuvraj Singh","MS Dhoni","Herschelle Gibbs"],
answer:"Yuvraj Singh"
},

{
question:"Which stadium hosted the 2011 World Cup Final?",
options:["Eden Gardens","Wankhede Stadium","Chepauk","Feroz Shah Kotla"],
answer:"Wankhede Stadium"
},

{
question:"Who was the first player to score 10,000 ODI runs?",
options:["Sachin Tendulkar","Sunil Gavaskar","Viv Richards","Sourav Ganguly"],
answer:"Sachin Tendulkar"
},

{
question:"Which country won the ICC Champions Trophy 2017?",
options:["India","Pakistan","England","Australia"],
answer:"Pakistan"
},

{
question:"Who has the highest individual score in Test cricket?",
options:["Brian Lara","Matthew Hayden","Mahela Jayawardene","Virender Sehwag"],
answer:"Brian Lara"
},

{
question:"Which team won the first ICC T20 World Cup?",
options:["Pakistan","India","Australia","South Africa"],
answer:"India"
},

{
question:"Who was known as the Rawalpindi Express?",
options:["Wasim Akram","Waqar Younis","Shoaib Akhtar","Mohammad Amir"],
answer:"Shoaib Akhtar"
},

{
question:"Which batsman has the most centuries in international cricket?",
options:["Virat Kohli","Ricky Ponting","Sachin Tendulkar","Kumar Sangakkara"],
answer:"Sachin Tendulkar"
},

{
question:"Who was the first cricketer to score 400 runs in a Test innings?",
options:["Brian Lara","Don Bradman","Matthew Hayden","Rahul Dravid"],
answer:"Brian Lara"
},

{
question:"Which country hosted the first day-night Test match?",
options:["India","England","Australia","New Zealand"],
answer:"Australia"
},

{
question:"What is Don Bradman's Test batting average?",
options:["99.94","98.12","100.00","97.88"],
answer:"99.94"
},

{
question:"Which Indian bowler took a hat-trick in the 2019 World Cup?",
options:["Mohammed Shami","Jasprit Bumrah","Kuldeep Yadav","Bhuvneshwar Kumar"],
answer:"Mohammed Shami"
},

{
question:"Who captained India in the inaugural T20 World Cup 2007?",
options:["Virender Sehwag","Yuvraj Singh","MS Dhoni","Rahul Dravid"],
answer:"MS Dhoni"
},

{
question:"Which cricketer is nicknamed Universe Boss?",
options:["Andre Russell","Chris Gayle","Kieron Pollard","Dwayne Bravo"],
answer:"Chris Gayle"
},

{
question:"Who was the first bowler to take 600 Test wickets?",
options:["Shane Warne","Muttiah Muralitharan","Anil Kumble","Glenn McGrath"],
answer:"Shane Warne"
},

{
question:"Which team won the World Test Championship 2023?",
options:["India","Australia","England","New Zealand"],
answer:"Australia"
},

{
question:"Which cricketer has scored the most runs in IPL history?",
options:["Rohit Sharma","Virat Kohli","Shikhar Dhawan","Suresh Raina"],
answer:"Virat Kohli"
}

];

const form = document.getElementById("quizForm");

quizData.forEach((q,index)=>{

let html = `
<div class="question">
<p>${index+1}. ${q.question}</p>
`;

q.options.forEach(option=>{
html += `
<label>
<input type="radio" name="q${index}" value="${option}">
${option}
</label>
`;
});

html += `</div>`;

form.innerHTML += html;
});

function checkAnswers(){

let score = 0;

quizData.forEach((q,index)=>{

const selected =
document.querySelector(`input[name="q${index}"]:checked`);

if(selected && selected.value === q.answer){
score++;
}

});

document.getElementById("result").innerHTML =
`🏆 Your Score: ${score} / ${quizData.length}`;
}

</script>

</body>
</html>

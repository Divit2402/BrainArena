<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cricket Quiz</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(to right,#0f9b0f,#56ab2f);
    margin:0;
    padding:20px;
}

.quiz-container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#2e7d32;
}

.question{
    background:#f9fff8;
    border-left:5px solid #4caf50;
    padding:15px;
    margin:20px 0;
    border-radius:8px;
}

button{
    display:block;
    margin:20px auto;
    padding:12px 25px;
    font-size:18px;
    background:#2e7d32;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#1b5e20;
}

#result{
    text-align:center;
    font-size:24px;
    font-weight:bold;
    color:#2e7d32;
    margin-top:20px;
}
</style>
</head>
<body>

<div class="quiz-container">
<h1>🏏 Cricket Quiz 🏏</h1>

<form id="quizForm"></form>

<button type="button" onclick="checkAnswers()">Submit Quiz</button>

<div id="result"></div>
</div>

<script>

const quizData = [

{question:"How many players are there in a cricket team?",options:["9","10","11","12"],answer:"11"},
{question:"Which country won the ICC Cricket World Cup 2023?",options:["India","Australia","England","Pakistan"],answer:"Australia"},
{question:"How many overs are played in a T20 innings?",options:["10","15","20","25"],answer:"20"},
{question:"Who is known as the God of Cricket?",options:["Virat Kohli","MS Dhoni","Sachin Tendulkar","Rohit Sharma"],answer:"Sachin Tendulkar"},
{question:"How many runs does a boundary score?",options:["2","3","4","6"],answer:"4"},
{question:"How many runs does a six score?",options:["4","5","6","8"],answer:"6"},
{question:"What is the length of a cricket pitch?",options:["20 yards","22 yards","24 yards","26 yards"],answer:"22 yards"},
{question:"Which country is the birthplace of cricket?",options:["India","Australia","England","South Africa"],answer:"England"},
{question:"How many wickets can fall in an innings?",options:["8","9","10","11"],answer:"10"},
{question:"Who is called Captain Cool?",options:["Rohit Sharma","Virat Kohli","MS Dhoni","KL Rahul"],answer:"MS Dhoni"},
{question:"Which trophy is played between India and Australia in Tests?",options:["Ashes","Border-Gavaskar Trophy","Champions Trophy","World Cup"],answer:"Border-Gavaskar Trophy"},
{question:"How many balls are there in one over?",options:["5","6","7","8"],answer:"6"},
{question:"What is the highest individual score in ODI cricket?",options:["264","250","300","240"],answer:"264"},
{question:"Who scored 100 international centuries?",options:["Virat Kohli","Ricky Ponting","Sachin Tendulkar","Kumar Sangakkara"],answer:"Sachin Tendulkar"},
{question:"Which format has 20 overs per side?",options:["ODI","Test","T20","The Hundred"],answer:"T20"},
{question:"What is LBW short for?",options:["Leg Before Wicket","Long Ball Wicket","Leg Ball Wide","Last Ball Wicket"],answer:"Leg Before Wicket"},
{question:"Which country hosts the IPL?",options:["England","Australia","India","South Africa"],answer:"India"},
{question:"What is the maximum score from one legal ball?",options:["4","6","7","8"],answer:"6"},
{question:"Which player is known as the Hitman?",options:["Virat Kohli","MS Dhoni","Rohit Sharma","Hardik Pandya"],answer:"Rohit Sharma"},
{question:"How many umpires are usually on the field?",options:["1","2","3","4"],answer:"2"},
{question:"What color ball is generally used in Test cricket?",options:["White","Pink","Red","Blue"],answer:"Red"},
{question:"Which team has won the most ODI World Cups?",options:["India","England","Australia","Pakistan"],answer:"Australia"},
{question:"What is a duck in cricket?",options:["100 runs","0 runs","50 runs","6 wickets"],answer:"0 runs"},
{question:"Which Indian player is called the King of Cricket?",options:["Virat Kohli","Rohit Sharma","Dhoni","Gill"],answer:"Virat Kohli"},
{question:"How many teams play in a cricket match?",options:["1","2","3","4"],answer:"2"}

];

const form = document.getElementById("quizForm");

quizData.forEach((q,index)=>{

let html = `
<div class="question">
<p><strong>${index+1}. ${q.question}</strong></p>
`;

q.options.forEach(option=>{
html += `
<label>
<input type="radio" name="q${index}" value="${option}">
${option}
</label><br>
`;
});

html += `</div>`;

form.innerHTML += html;

});

function checkAnswers(){

let score = 0;

quizData.forEach((q,index)=>{

const selected =
document.querySelector(`input[name="q${index}"]:checked`);

if(selected && selected.value === q.answer){
score++;
}

});

document.getElementById("result").innerHTML =
`🏆 Your Score: ${score} / ${quizData.length}`;

window.scrollTo({
top: document.body.scrollHeight,
behavior: "smooth"
});

}

</script>

</body>
</html>
